name: Release dataset

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dataset
        run: |
          python3 -m pip install --quiet jsonschema
          python3 scripts/validate.py

      - name: Package data snapshot
        run: zip -r "hierologia-data-${{ github.ref_name }}.zip" data schema CITATION.cff LICENSE README.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "hierologia-data-${{ github.ref_name }}.zip"
          --title "Hierologia ${{ github.ref_name }}"
          --notes "Dataset snapshot. See CHANGELOG.md for what changed in this release."
